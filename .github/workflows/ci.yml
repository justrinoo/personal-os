name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Lint & Build
    runs-on: ubuntu-latest
    env:
      # Build never connects to a database (pages are force-dynamic),
      # but Prisma config requires the variable to be present.
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      BETTER_AUTH_SECRET: ci-only-secret-not-used-at-runtime
      BETTER_AUTH_URL: http://localhost:3000
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies (runs prisma generate via postinstall)
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
